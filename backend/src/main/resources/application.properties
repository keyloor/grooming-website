spring.application.name=demo

# Perfil por defecto: "local" se activa SOLO si no hay otro perfil activo
# (sirve para que cada desarrollador use application-local.properties sin tocar nada;
#  en Render no afecta porque application-local.properties está gitignored).
spring.profiles.default=local

# Configuración de la base de datos (lee env vars en Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor (Render asigna $PORT) 
server.port=${PORT:8080}
